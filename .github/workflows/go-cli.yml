name: Go CLI

on:
  push:
    branches: [main]
    paths: ["cli-go/**", ".github/workflows/go-cli.yml"]
  pull_request:
    branches: [main]
    paths: ["cli-go/**", ".github/workflows/go-cli.yml"]

defaults:
  run:
    working-directory: cli-go

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: cli-go/go.sum
      - run: go build ./...
      - run: go vet ./...
      - run: go test -race ./...
