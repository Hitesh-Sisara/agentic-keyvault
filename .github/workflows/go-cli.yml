name: Go CLI

on:
  push:
    branches: [main]
    paths: ["cli-go/**", ".github/workflows/go-cli.yml"]
  pull_request:
    branches: [main]
    paths: ["cli-go/**", ".github/workflows/go-cli.yml"]

defaults:
  run:
    working-directory: cli-go

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: cli-go/go.sum
      - run: go build ./...
      - run: go test ./...

  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: cli-go/go.sum
      - run: go vet ./...
      - run: go test -race ./...
      - name: staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck ./...
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
