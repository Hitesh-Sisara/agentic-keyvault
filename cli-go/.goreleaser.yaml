version: 2
project_name: akv

before:
  hooks:
    - go mod tidy

builds:
  - id: akv
    main: ./cmd/akv
    binary: akv
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X github.com/Hitesh-Sisara/agentic-keyvault/cli-go/internal/version.Version={{.Version}}
      - -X github.com/Hitesh-Sisara/agentic-keyvault/cli-go/internal/version.Commit={{.ShortCommit}}
      - -X github.com/Hitesh-Sisara/agentic-keyvault/cli-go/internal/version.Date={{.Date}}

archives:
  - id: default
    name_template: "akv_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

release:
  github:
    owner: Hitesh-Sisara
    name: agentic-keyvault
